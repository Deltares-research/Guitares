repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: check-case-conflict
    -   id: trailing-whitespace
    -   id: check-toml
    -   id: check-merge-conflict
    -   id: check-added-large-files
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.8
  hooks:
    - id: ruff
      args: ['--fix', --exit-non-zero-on-fix]
    - id: ruff-format
-   repo: https://github.com/crate-ci/typos
    rev: v1.23.6
    hooks:
    -   id: typos
-   repo: local
    hooks:
    -   id: pytest
        name: pytest
        entry: cmd.exe /c "C:\Users\ormondt\miniforge3\Scripts\conda.exe run -n guitares_dev python -m pytest tests/test_widgets.py -q --no-cov --override-ini=addopts="
        language: system
        pass_filenames: false
        always_run: true
