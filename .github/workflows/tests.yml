name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: "${{ matrix.os }}"
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - python-version: "3.12"
            os: ubuntu-latest
            coverage: true
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup MiniConda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: guitares
          auto-update-conda: true
          channels: conda-forge

      - name: Create environment
        shell: bash -el {0}
        run: |
          conda create -n guitares python=${{ matrix.python-version }} -y

      - name: Install Qt/OpenGL system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libglx-mesa0 libxkbcommon0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 xvfb

      - name: Install test dependencies
        run: |
          conda run -n guitares pip install -e ".[tests]"

      - name: Test with pytest (Linux — with virtual display)
        if: runner.os == 'Linux'
        run: |
          conda run -n guitares xvfb-run -a pytest tests

      - name: Test with pytest
        if: runner.os != 'Linux'
        run: |
          conda run -n guitares pytest tests

      - name: Upload coverage report
        if: matrix.coverage == true
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: coverage-report
          path: coverage.xml
