<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>MapLibre</title>

    <!-- MapLibre GL JS -->
    <script src="/js/maplibre-gl-5.22.0.js"></script>
    <link href="/css/maplibre-gl-5.22.0.css" rel="stylesheet"/>

    <!-- MapBox Draw (for drawing tools) -->
    <script src="/js/mapbox-gl-draw-v1.5.1.js"></script>
    <link href="/css/mapbox-gl-draw.css" rel="stylesheet"/>

    <!-- Turf.js (geospatial utilities) -->
    <script src="/js/turf-v7.js"></script>

    <!-- Qt WebChannel bridge -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <!-- Geocoder (online only) -->
    <script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.css"/>

    <!-- Configuration (generated by Python at startup) -->
    <script src="/js/defaults.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/map_styles.js"></script>

    <!-- Custom styles -->
    <link href="/css/maplibre.css" rel="stylesheet"/>
    <link href="/css/basemap_control.css" rel="stylesheet"/>

    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="map" class="map" style="width: 100%; height: 100%;"></div>

    <!--
      draw_layer.js must load before main.js because it creates the
      MapboxDraw instance that main.js adds to the map control.
      All other layer modules are loaded on demand by runjs().
    -->
    <script type="module" src="/js/draw_layer.js"></script>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
